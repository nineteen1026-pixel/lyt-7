<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}钓点日志{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎣 钓点日志</h1>
            <nav>
                <a href="{{ url_for('index') }}" class="{% if request.endpoint == 'index' %}active{% endif %}">首页</a>
                <a href="{{ url_for('add_log') }}" class="{% if request.endpoint == 'add_log' %}active{% endif %}">新增记录</a>
                <a href="{{ url_for('spots_list') }}" class="{% if request.endpoint in ['spots_list', 'spot_detail', 'add_spot', 'edit_spot'] %}active{% endif %}">钓点管理</a>
                <a href="{{ url_for('spots_list', filter='favorite') }}" class="{% if request.endpoint == 'spots_list' and request.args.get('filter') == 'favorite' %}active{% endif %}">⭐ 收藏评分</a>
                <a href="{{ url_for('by_spot') }}" class="{% if request.endpoint == 'by_spot' %}active{% endif %}">按钓点</a>
                <a href="{{ url_for('by_date') }}" class="{% if request.endpoint == 'by_date' %}active{% endif %}">按日期</a>
            </nav>
        </header>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <main>
            {% block content %}{% endblock %}
        </main>

        <footer>
            <p>© 2026 钓点日志 | 记录每一次垂钓的精彩</p>
        </footer>
    </div>
</body>
</html>
