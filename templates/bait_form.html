{% extends 'base.html' %}

{% block title %}{% if bait %}编辑饵料{% else %}新增饵料{% endif %} - 钓点日志{% endblock %}

{% block content %}
    <div class="page-header">
        <h2>{% if bait %}✏️ 编辑饵料{% else %}➕ 新增饵料{% endif %}</h2>
        <a href="{{ url_for('baits_list') }}" class="btn btn-secondary">返回列表</a>
    </div>

    <form method="POST" class="log-form">
        <div class="form-grid">
            <div class="form-group full-width">
                <label>饵料名称 <span class="required">*</span></label>
                <input type="text" name="name" required maxlength="100"
                       value="{{ bait['name'] if bait else '' }}"
                       placeholder="例如：蓝鲫+九一八">
            </div>

            <div class="form-group">
                <label>饵料类型</label>
                <input type="text" name="type" maxlength="50"
                       value="{{ bait['type'] if bait else '' }}"
                       placeholder="例如：商品饵、活饵、自制饵">
            </div>

            <div class="form-group">
                <label>品牌</label>
                <input type="text" name="brand" maxlength="50"
                       value="{{ bait['brand'] if bait else '' }}"
                       placeholder="例如：龙王恨、老鬼">
            </div>

            <div class="form-group full-width">
                <label>饵料描述</label>
                <textarea name="description" rows="4" maxlength="500"
                          placeholder="描述饵料配方、适用鱼种、使用心得等...">{{ bait['description'] if bait else '' }}</textarea>
            </div>
        </div>

        <div class="form-actions">
            <a href="{{ url_for('baits_list') }}" class="btn btn-secondary">取消</a>
            <button type="submit" class="btn btn-primary">
                {% if bait %}保存修改{% else %}添加饵料{% endif %}
            </button>
        </div>
    </form>
{% endblock %}
